<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>거울 너머 공략</title>
  <style>
    @font-face {
      font-family: 'KimJeongcheolMyoungjo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302_01@1.0/KimjungchulMyungjo-Light.woff2') format('woff2');
      font-weight: 300;
      font-display: swap;
    }
    @font-face {
      font-family: 'KimJeongcheolMyoungjo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302_01@1.0/KimjungchulMyungjo-Regular.woff2') format('woff2');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'KimJeongcheolMyoungjo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302_01@1.0/KimjungchulMyungjo-Bold.woff2') format('woff2');
      font-weight: 700;
      font-display: swap;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      color: #c0c0c0;
      font-family: 'KimJeongcheolMyoungjo', 'Malgun Gothic', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.7;
    }

    /* 헤더 */
    #header {
      width: 100%;
      height: 270px;
      background: #111 url('Image/Header.png') center / cover no-repeat;
      margin-bottom: 80px;
    }

    /* 전체 레이아웃 */
    #layout {
      display: flex;
      align-items: flex-start;
      min-height: calc(100vh - 270px);
    }

    /* 본문 */
    #content {
      flex: 1;
      padding: 36px 48px;
      min-width: 0;
    }

    /* 섹션 */
    .section { margin-bottom: 44px; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      margin-bottom: 18px;
      user-select: none;
      width: fit-content;
    }

    /* 열린 상태 기본값: ◆ 회색 아이콘 + 회색 글씨 */
    .section-icon {
      font-size: 24px;
      color: #555;
      line-height: 1;
      margin-left: 200px;
    }
    .section-title {
      font-size: 28px;
      color: #aaa;
      font-weight: 400;
    }

    /* 닫힌 상태: ■ 빨간 아이콘 + 빨간 글씨 */
    .section-header.closed .section-icon {
      color: #cc0000;
    }
    .section-header.closed .section-title {
      color: #cc0000;
    }

    /* 섹션 바디 */
    .section-body { display: block; }
    .section-body.hidden { display: none; }

    .section-image {
      width: 800px;
      height: 450px;
      margin-left: 200px;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      color: #444;
      overflow: hidden;
    }
    .section-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .section-desc {
      font-size: 20px;
      color: #777;
      line-height: 1.8;
      margin-left: 200px;
    }

    /* 사이드바: 스크롤해도 항상 고정 */
    #sidebar {
      width: 490px;
      flex-shrink: 0;
      border-left: 1px solid #1a1a1a;
      background: #050505;
      padding: 26px 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-section-title {
      font-size: 20px;
      color: #aaa;
      margin-bottom: 14px;
      font-weight: 400;
    }

    .sidebar-note {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 5px;
      line-height: 1.7;
    }

    .sidebar-divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 18px 0;
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #aaa;
      font-size: 20px;
      font-family: 'KimJeongcheolMyoungjo', sans-serif;
      margin: 20px 0;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      transition: color 0.15s;
    }
    .sidebar-btn::before {
      content: '■';
      color: #cc0000;
      font-size: 11px;
    }
    .sidebar-btn:hover { color: #fff; }
  </style>
</head>
<body>

  <div id="header"></div>

  <div id="layout">

    <div id="content">

      <div class="section">
        <!-- 기본값: 열린 상태 → ■ 회색 -->
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-icon">■</span>
          <span class="section-title">학교 정문</span>
        </div>
        <div class="section-body">
          <div class="section-image">
            <img src="./Image/1.png" alt="학교 정문">
          </div>
          <p class="section-desc">숙제를 놓고 온 세빈이.</p>
        </div>
      </div>

      <div class="section">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-icon">■</span>
          <span class="section-title">1학년 4반</span>
        </div>
        <div class="section-body">
          <div class="section-image">
            <!-- <img src="Image/classroom.png" alt="1학년 4반"> -->
            <span>이미지 영역</span>
          </div>
          <p class="section-desc">교실에 들어와서 숙제 아이템을 획득해 줍니다.</p>
        </div>
      </div>

      <div class="section">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-icon">■</span>
          <span class="section-title">1학년 4반</span>
        </div>
        <div class="section-body">
          <div class="section-image">
            <!-- <img src="Image/classroom.png" alt="1학년 4반"> -->
            <span>이미지 영역</span>
          </div>
          <p class="section-desc">교실에 들어와서 숙제 아이템을 획득해 줍니다.</p>
        </div>
      </div>

      <div class="section">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-icon">■</span>
          <span class="section-title">1학년 4반</span>
        </div>
        <div class="section-body">
          <div class="section-image">
            <!-- <img src="Image/classroom.png" alt="1학년 4반"> -->
            <span>이미지 영역</span>
          </div>
          <p class="section-desc">교실에 들어와서 숙제 아이템을 획득해 줍니다.</p>
        </div>
      </div>
      

    </div>

    <div id="sidebar">
      <p class="sidebar-section-title">[공략 및 해설]</p>
      <p class="sidebar-note">※ 스포 방지를 위해 ◆ 눌러서 공략을 보실 수 있습니다.</p>
      <p class="sidebar-note">※ Ctrl + F를 누르고 장소를 검색해서 원하는 부분을 서치할 수 있습니다.</p>
      <hr class="sidebar-divider">
      <button class="sidebar-btn" onclick="openAll()">전체 열기</button>
      <button class="sidebar-btn" onclick="closeAll()">전체 닫기</button>
    </div>

  </div>

  <script>
    function toggleSection(header) {
      const body = header.nextElementSibling;
      const icon = header.querySelector('.section-icon');
      const isClosed = header.classList.contains('closed');

      if (isClosed) {
        // 열기: ◆ 회색
        header.classList.remove('closed');
        icon.textContent = '◆';
        body.classList.remove('hidden');
      } else {
        // 닫기: ■ 빨간색
        header.classList.add('closed');
        icon.textContent = '■';
        body.classList.add('hidden');
      }
    }

    function openAll() {
      document.querySelectorAll('.section-header').forEach(header => {
        const body = header.nextElementSibling;
        const icon = header.querySelector('.section-icon');
        header.classList.remove('closed');
        icon.textContent = '◆';
        body.classList.remove('hidden');
      });
    }

    function closeAll() {
      document.querySelectorAll('.section-header').forEach(header => {
        const body = header.nextElementSibling;
        const icon = header.querySelector('.section-icon');
        header.classList.add('closed');
        icon.textContent = '■';
        body.classList.add('hidden');
      });
    }
  </script>

</body>
</html>
